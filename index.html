<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspadinha - Amor às Pedaços</title>
    <link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ebc5d0; /* Rosa Marca */
            font-family: 'Chau Philomene One', sans-serif;
            color: #5e3427; /* Castanho Marca */
            overflow: hidden;
        }

        .header-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-container h1 {
            font-size: 38px;
            margin: 0;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .header-container h2 {
            font-size: 22px;
            margin: 5px 0 0 0;
            text-transform: uppercase;
        }

        #wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            border: 5px solid #5e3427;
            border-radius: 20px;
            background-color: #ebc5d0;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(94, 52, 39, 0.3);
        }

        #prize-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        #prize-layer h3 {
            font-size: 28px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        #prize-layer p {
            font-size: 16px;
            margin: 0;
            font-weight: bold;
        }

        #scratch-surface {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            cursor: crosshair;
            touch-action: none;
        }

        .logo-footer {
            margin-top: 30px;
        }

        .logo-footer img {
            width: 160px;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>NÃO<br>RESISTA....</h1>
        <h2>DESCUBRA O RECHEIO!</h2>
    </div>

    <div id="wrapper">
        <div id="prize-layer">
            <h3>OFERTA DE<br>UM BRIGADEIRO</h3>
            <p>em compras iguais ou superiores a 5€</p>
        </div>
        <canvas id="scratch-surface" width="300" height="300"></canvas>
    </div>

    <div class="logo-footer">
        <img src="logo.png" alt="Amor às Pedaços Logo">
    </div>

<script>
    const canvas = document.getElementById('scratch-surface');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function init() {
        ctx.fillStyle = '#5e3427'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function scratch(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 35, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });

    window.onload = init;
</script>

</body>
</html>
