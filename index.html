<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspadinha - Brigadeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: 'Chau Philomene One', sans-serif;
            color: #5e3427; /* Castanho [cite: 1, 2, 5, 6] */
        }

        /* Texto exterior (Página 1) */
        .header-text {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-text h1 {
            font-size: 32px;
            margin: 0;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .header-text h2 {
            font-size: 24px;
            margin: 5px 0 0 0;
            color: #ebc5d0; /* Rosa [cite: 3, 4] */
            -webkit-text-stroke: 0.5px #5e3427;
        }

        #scratch-container {
            position: relative;
            width: 300px;
            height: 300px; /* Formato quadrado para a raspadinha */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
            background: #ebc5d0; /* Rosa  */
            overflow: hidden;
            border: 5px solid #5e3427;
        }

        /* Página 2: Prémio (Interior) */
        #prize-content {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #prize-content h3 {
            font-size: 26px;
            margin: 0 0 10px 0;
            color: #5e3427;
        }

        #prize-content p {
            font-size: 14px;
            margin: 0;
            color: #5e3427;
        }

        /* Camada de raspagem */
        #scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            cursor: pointer;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>NÃO<br>RESISTA....</h1>
        <h2>DESCUBRA O RECHEIO!</h2>
    </div>

    <div id="scratch-container">
        <div id="prize-content">
            <h3>OFERTA DE<br>UM BRIGADEIRO</h3>
            <p>em compras iguais ou superiores a 5€</p>
        </div>

        <canvas id="scratch-canvas" width="300" height="300"></canvas>
    </div>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function init() {
        // Cor sólida para a raspadinha (Castanho) [cite: 1, 2]
        ctx.fillStyle = '#5e3427'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Adicionar um padrão simples para indicar que é para raspar
        ctx.strokeStyle = '#ebc5d0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(50, 50);
        ctx.lineTo(250, 250);
        ctx.stroke();
    }

    function scratch(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });

    window.onload = init;
</script>

</body>
</html>
