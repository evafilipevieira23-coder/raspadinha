<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspadinha Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            font-family: 'Chau Philomene One', sans-serif;
            color: #5e3427; /* Castanho fornecido */
        }

        /* TEXTO EXTERIOR (Página 1) */
        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-container h1 {
            font-size: 40px;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }

        .header-container h2 {
            font-size: 24px;
            margin: 10px 0 0 0;
            color: #ebc5d0; /* Rosa fornecido */
            -webkit-text-stroke: 1px #5e3427;
            text-transform: uppercase;
        }

        /* ÁREA DA RASPADINHA */
        #wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            border: 4px solid #5e3427;
            border-radius: 10px;
            background-color: #ebc5d0; /* Rosa por baixo */
            overflow: hidden;
        }

        /* PRÉMIO (Página 2 - O que está por baixo) */
        #prize-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        #prize-layer h3 {
            font-size: 28px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        #prize-layer p {
            font-size: 16px;
            margin: 0;
        }

        /* CAMADA DE COBERTURA (Canvas) */
        #scratch-surface {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            cursor: crosshair;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>NÃO<br>RESISTA....</h1>
        <h2>DESCUBRA O RECHEIO!</h2>
    </div>

    <div id="wrapper">
        <div id="prize-layer">
            <h3>OFERTA DE<br>UM BRIGADEIRO</h3>
            <p>em compras iguais ou superiores a 5€</p>
        </div>

        <canvas id="scratch-surface" width="300" height="300"></canvas>
    </div>

<script>
    const canvas = document.getElementById('scratch-surface');
    const ctx = canvas.getContext('2d');
    let isPressed = false;

    // Pintar a cobertura de castanho sólido (Sem texto dentro)
    function setup() {
        ctx.fillStyle = '#5e3427'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function reveal(e) {
        if (!isPressed) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 35, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isPressed = true);
    canvas.addEventListener('mouseup', () => isPressed = false);
    canvas.addEventListener('mousemove', reveal);
    
    canvas.addEventListener('touchstart', (e) => { isPressed = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => isPressed = false);
    canvas.addEventListener('touchmove', (e) => { reveal(e); e.preventDefault(); });

    window.onload = setup;
</script>

</body>
</html>
